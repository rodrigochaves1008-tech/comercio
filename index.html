<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Consulta de Estoque</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --bg:#0a0e14; --panel:#141a24; --panel-2:#1c2531;
    --txt:#f2f5f8; --muted:#8a97a6; --line:#26313f;
    --accent:#3da9fc; --ok:#2ec27e; --bad:#ff5d5d; --warn:#ffb020;
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 14px);
    max-width:520px; margin:0 auto; min-height:100vh;
  }
  header{padding:18px 2px 12px}
  h1{font-size:1.15rem;font-weight:700;margin:0;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:.8rem;margin-top:2px}
  .controls{display:flex;gap:10px;margin:14px 0}
  button{
    font-family:inherit;font-size:1rem;font-weight:600;border:none;
    border-radius:var(--radius);padding:16px;cursor:pointer;flex:1;
    color:var(--txt);transition:transform .05s,opacity .15s;
  }
  button:active{transform:scale(.97)}
  .btn-primary{background:var(--accent);color:#04121f}
  .btn-secondary{background:var(--panel-2);border:1px solid var(--line)}
  button:disabled{opacity:.45}
  #reader{
    width:100%;aspect-ratio:1/1;background:#000;border-radius:var(--radius);
    overflow:hidden;border:1px solid var(--line);position:relative;
  }
  #reader video{object-fit:cover !important}
  #reader.idle::after{
    content:"Câmera desligada";position:absolute;inset:0;display:flex;
    align-items:center;justify-content:center;color:var(--muted);font-size:.9rem;
  }
  /* esconde a UI verbosa nativa do html5-qrcode */
  #reader img[alt="Info icon"], #reader__dashboard_section_csr span,
  #reader__status_span, #reader__header_message{display:none !important}
  #reader__dashboard{padding:6px !important}

  .result{margin-top:16px}
  .card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:18px;
  }
  .card h2{font-size:1.25rem;margin:0 0 4px;line-height:1.25}
  .ids{color:var(--muted);font-size:.78rem;margin-bottom:14px;word-break:break-all}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .cell{background:var(--panel-2);border-radius:12px;padding:12px}
  .cell .lbl{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.5px}
  .cell .val{font-size:1.25rem;font-weight:700;margin-top:3px}
  .cell.wide{grid-column:1/-1}
  .val.ok{color:var(--ok)} .val.bad{color:var(--bad)}
  .cost-flag{
    grid-column:1/-1;border-radius:12px;padding:11px 14px;font-size:.85rem;
    font-weight:600;display:flex;align-items:center;gap:8px;
  }
  .cost-flag.ok{background:rgba(46,194,126,.12);color:var(--ok);border:1px solid rgba(46,194,126,.3)}
  .cost-flag.bad{background:rgba(255,93,93,.12);color:var(--bad);border:1px solid rgba(255,93,93,.3)}
  .cost-flag.eq{background:var(--panel-2);color:var(--muted);border:1px solid var(--line)}

  .notfound{
    background:rgba(255,93,93,.12);border:1px solid rgba(255,93,93,.35);
    color:var(--bad);border-radius:var(--radius);padding:20px;text-align:center;
    font-weight:600;
  }
  .notfound .code{display:block;color:var(--muted);font-weight:400;font-size:.8rem;margin-top:6px}

  .status{
    text-align:center;color:var(--muted);font-size:.82rem;margin:12px 0;min-height:1em;
  }
  .status.loading{color:var(--accent)}

  .history{margin-top:22px}
  .history h3{font-size:.78rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 8px}
  .hist-item{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:11px 14px;margin-bottom:7px;
  }
  .hist-item .hname{font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hist-item .hprice{font-weight:700;color:var(--accent);white-space:nowrap}
  .empty{color:var(--muted);font-size:.85rem}
  @media (prefers-reduced-motion: reduce){button{transition:none}}
</style>
</head>
<body>
<header>
  <h1>Consulta de Estoque</h1>
  <div class="sub" id="loaded-info">Carregando base de dados…</div>
</header>

<div class="controls">
  <button class="btn-primary" id="btn-start" disabled>Iniciar câmera</button>
  <button class="btn-secondary" id="btn-refresh">Atualizar dados</button>
</div>

<div id="reader" class="idle"></div>
<div class="status" id="status"></div>

<div class="result" id="result"></div>

<div class="history">
  <h3>Últimas consultas</h3>
  <div id="history-list"><div class="empty">Nenhuma consulta ainda.</div></div>
</div>

<script>
(function(){
  "use strict";

  // ---- Estado em memória ----
  var produtos = [];          // lista completa
  var idxEan = {};            // ean -> índice
  var idxCodigo = {};         // codigo_sistema -> índice (fallback)
  var historico = [];         // últimas consultas da sessão
  var scanner = null;
  var scanning = false;
  var pausado = false;

  var elStart   = document.getElementById('btn-start');
  var elRefresh = document.getElementById('btn-refresh');
  var elResult  = document.getElementById('result');
  var elStatus  = document.getElementById('status');
  var elInfo    = document.getElementById('loaded-info');
  var elHist    = document.getElementById('history-list');
  var elReader  = document.getElementById('reader');

  function setStatus(msg, loading){
    elStatus.textContent = msg || '';
    elStatus.className = 'status' + (loading ? ' loading' : '');
  }

  function fmtBRL(n){
    if(n === null || n === undefined || isNaN(n)) return '—';
    return 'R$ ' + Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
  function fmtNum(n){
    if(n === null || n === undefined || isNaN(n)) return '—';
    return Number(n).toLocaleString('pt-BR',{maximumFractionDigits:2});
  }

  // ---- Carregamento do JSON ----
  function carregarDados(){
    setStatus('Carregando dados…', true);
    elStart.disabled = true;
    // cache-bust para o botão "Atualizar dados" pegar o arquivo novo do servidor
    fetch('dados.json?v=' + Date.now(), {cache:'no-store'})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(d){
        produtos = d.produtos || [];
        idxEan = {}; idxCodigo = {};
        produtos.forEach(function(p,i){
          if(p.ean) idxEan[String(p.ean)] = i;
          if(p.codigo_sistema) idxCodigo[String(p.codigo_sistema)] = i;
        });
        elInfo.textContent = produtos.length.toLocaleString('pt-BR') +
          ' produtos • atualizado ' + (d.gerado_em ? d.gerado_em.replace('T',' ') : '');
        elStart.disabled = false;
        setStatus('Pronto. Toque em "Iniciar câmera".');
      })
      .catch(function(e){
        elInfo.textContent = 'Falha ao carregar dados.json';
        setStatus('Erro: ' + e.message + '. Verifique se dados.json está na mesma pasta.');
      });
  }

  // ---- Busca de produto pelo código lido ----
  function buscar(codigo){
    var c = String(codigo).trim();
    if(idxEan[c] !== undefined) return produtos[idxEan[c]];
    // EAN pode vir com zeros à esquerda; tenta normalizar
    var semZero = c.replace(/^0+/, '');
    if(idxEan[semZero] !== undefined) return produtos[idxEan[semZero]];
    if(idxCodigo[c] !== undefined) return produtos[idxCodigo[c]];
    return null;
  }

  // ---- Render do resultado ----
  function renderProduto(p){
    var rep = p.custo_reposicao, med = p.custo_medio;
    var flag = '<div class="cost-flag eq">Sem comparação de custo disponível</div>';
    if(rep !== null && med !== null && rep !== undefined && med !== undefined){
      if(rep > med){
        flag = '<div class="cost-flag bad">▲ Reposição acima do custo médio (+'+fmtBRL(rep-med)+')</div>';
      } else if(rep < med){
        flag = '<div class="cost-flag ok">▼ Reposição abaixo do custo médio ('+fmtBRL(rep-med)+')</div>';
      } else {
        flag = '<div class="cost-flag eq">＝ Reposição igual ao custo médio</div>';
      }
    }
    var idLinha = [];
    if(p.ean) idLinha.push('EAN ' + p.ean);
    if(p.codigo_sistema) idLinha.push('Cód ' + p.codigo_sistema);
    if(p.id_interno) idLinha.push('ID ' + p.id_interno);

    elResult.innerHTML =
      '<div class="card">' +
        '<h2>' + escapeHtml(p.nome) + '</h2>' +
        '<div class="ids">' + escapeHtml(idLinha.join('  •  ')) + '</div>' +
        '<div class="grid">' +
          cell('Estoque atual', fmtNum(p.estoque)) +
          cell('Venda média/mês', fmtNum(p.venda_media_mensal)) +
          cell('Custo médio', fmtBRL(med)) +
          cell('Custo reposição', fmtBRL(rep)) +
          cellWide('Preço de venda', fmtBRL(p.preco_venda)) +
          flag +
        '</div>' +
      '</div>';

    addHistorico(p);
  }

  function cell(lbl,val){ return '<div class="cell"><div class="lbl">'+lbl+'</div><div class="val">'+val+'</div></div>'; }
  function cellWide(lbl,val){ return '<div class="cell wide"><div class="lbl">'+lbl+'</div><div class="val">'+val+'</div></div>'; }

  function renderNaoEncontrado(codigo){
    elResult.innerHTML =
      '<div class="notfound">Produto não encontrado na base' +
      '<span class="code">' + escapeHtml(codigo) + '</span></div>';
  }

  function escapeHtml(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ---- Histórico (últimos 3) ----
  function addHistorico(p){
    historico.unshift({nome:p.nome, preco:p.preco_venda});
    historico = historico.slice(0,3);
    renderHistorico();
  }
  function renderHistorico(){
    if(!historico.length){ elHist.innerHTML = '<div class="empty">Nenhuma consulta ainda.</div>'; return; }
    elHist.innerHTML = historico.map(function(h){
      return '<div class="hist-item"><span class="hname">'+escapeHtml(h.nome)+
             '</span><span class="hprice">'+fmtBRL(h.preco)+'</span></div>';
    }).join('');
  }

  // ---- Scanner ----
  function onScan(decodedText){
    if(pausado) return;
    pausado = true;
    if(scanner){ try{ scanner.pause(true); }catch(e){} }

    var p = buscar(decodedText);
    if(p){
      setStatus('Encontrado: ' + p.nome);
      renderProduto(p);
    } else {
      setStatus('Código não cadastrado.');
      renderNaoEncontrado(decodedText);
    }
    // retoma após 2s, pronto para o próximo bip
    setTimeout(function(){
      pausado = false;
      if(scanner && scanning){ try{ scanner.resume(); }catch(e){} }
      setStatus('Pronto para o próximo código…');
    }, 2000);
  }

  function iniciarCamera(){
    if(scanning) return;
    if(!produtos.length){ setStatus('Dados ainda não carregados.'); return; }
    elReader.classList.remove('idle');
    scanner = new Html5Qrcode("reader", { verbose:false });
    var config = {
      fps: 15,
      qrbox: function(w,h){ var m = Math.floor(Math.min(w,h)*0.82); return {width:m, height:Math.floor(m*0.55)}; },
      aspectRatio: 1.0,
      formatsToSupport: [ Html5QrcodeSupportedFormats.EAN_13 ]
    };
    setStatus('Abrindo câmera…', true);
    scanner.start({ facingMode: "environment" }, config, onScan, function(){/* ignora erros de frame */})
      .then(function(){
        scanning = true;
        elStart.textContent = 'Parar câmera';
        setStatus('Aponte para o código de barras.');
      })
      .catch(function(err){
        elReader.classList.add('idle');
        setStatus('Não foi possível abrir a câmera: ' + err);
      });
  }

  function pararCamera(){
    if(scanner && scanning){
      scanner.stop().then(function(){
        try{ scanner.clear(); }catch(e){}
        scanning = false; pausado = false;
        elReader.classList.add('idle');
        elStart.textContent = 'Iniciar câmera';
        setStatus('Câmera parada.');
      });
    }
  }

  elStart.addEventListener('click', function(){
    if(scanning) pararCamera(); else iniciarCamera();
  });
  elRefresh.addEventListener('click', function(){
    carregarDados();
  });

  carregarDados();
})();
</script>
</body>
</html>
